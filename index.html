<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chór – Materiały do nauki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🎵 Materiały do nauki</h1>
            <p class="subtitle">Wybierz swój głos i ćwicz</p>
        </div>
    </header>

    <!-- Sticky toolbar -->
    <div class="toolbar" id="toolbar">
        <div class="toolbar-inner">
            <!-- Search -->
            <div class="search-bar">
                <input type="text" id="search" placeholder="Szukaj utworu, kompozytora...">
                <span class="search-icon">🔍</span>
            </div>

            <!-- Hamburger button with badge -->
            <div class="hamburger-wrapper">
                <button class="hamburger" id="hamburger" aria-label="Otwórz filtry">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <span class="hamburger-badge" id="hamburger-badge" style="display: none;">0</span>
            </div>
        </div>
    </div>

    <!-- Filters drawer -->
    <div class="filters" id="filters">
        <div class="filters-header">
            <span>Filtry</span>
            <button class="filters-close" id="filters-close" aria-label="Zamknij filtry">✕</button>
        </div>

        <div class="filters-content">
            <div class="filter-group">
                <h3>Głos:</h3>
                <div class="filter-buttons" id="voice-filters">
                    <button class="filter-btn active" data-voice="all">Wszystkie</button>
                </div>
            </div>

            <div class="filter-group">
                <h3>Typ nagrania:</h3>
                <div class="filter-buttons" id="type-filters">
                    <button class="filter-btn active" data-type="all">Wszystkie</button>
                    <button class="filter-btn" data-type="single">Pojedyncze głosy</button>
                    <button class="filter-btn" data-type="mix">Miksy</button>
                    <button class="filter-btn" data-type="unisono">Unisono</button>
                </div>
            </div>

            <div class="filter-group">
                <h3>Tagi:</h3>
                <div class="filter-buttons" id="tag-filters">
                </div>
            </div>

            <div class="filter-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="hide-unisono">
                    <span>Ukryj jednogłosowe (unisono)</span>
                </label>
            </div>

            <!-- Active filters indicator -->
            <div class="active-filters" id="active-filters" style="display: none;">
                <span>Aktywne filtry:</span>
                <div class="active-filters-list" id="active-filters-list"></div>
                <button class="clear-filters" id="clear-filters">Wyczyść wszystkie</button>
            </div>
        </div>
    </div>

    <!-- Overlay for drawer -->
    <div class="filters-overlay" id="filters-overlay"></div>

    <main>
        <!-- Songs grid -->
        <div class="songs-grid" id="songs-grid">
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <p>😔 Nie znaleziono nagrań pasujących do filtrów</p>
        </div>
    </main>

    <!-- Global audio player -->
    <div class="audio-player" id="audio-player">
        <div class="player-info">
            <span class="player-title" id="player-title">-</span>
            <span class="player-track" id="player-track">-</span>
        </div>
        <div class="player-controls">
            <button class="player-btn" id="player-prev" title="Poprzedni">⏮</button>
            <button class="player-btn player-btn-main" id="player-play" title="Play/Pause">▶</button>
            <button class="player-btn" id="player-next" title="Następny">⏭</button>
        </div>
        <div class="player-progress">
            <span id="player-current-time">0:00</span>
            <input type="range" id="player-seek" min="0" max="100" value="0">
            <span id="player-duration">0:00</span>
        </div>
        <div class="player-volume">
            <span>🔊</span>
            <input type="range" id="player-volume" min="0" max="100" value="80">
        </div>
        <button class="player-close" id="player-close">✕</button>
    </div>

    <audio id="audio-element"></audio>

    <script src="app.js"></script>
</body>
</html>
